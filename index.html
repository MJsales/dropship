<html lang="en">
<head>
<meta charset="UTF-8">
<title>5StarStunner</title>
<style>
body { margin:0; font-family: 'Segoe UI', sans-serif; background:#050005; color:white; }
header { display:flex; align-items:center; justify-content:space-between; padding:15px 30px; background:linear-gradient(90deg,#000,#6a0dad); }
header img { height:60px; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }
.hero { text-align:center; padding:80px 20px; background:radial-gradient(circle,#6a0dad33,#000); }
.hero h1 { font-size:50px; }
.hero p { color:#bbb; }
.hero button { background:#6a0dad; border:none; padding:12px 25px; color:white; cursor:pointer; border-radius:8px; }
.products { display:flex; flex-wrap:wrap; justify-content:center; padding:40px; }
.card { background:#0a0a0a; border:1px solid #6a0dad; border-radius:12px; margin:15px; padding:15px; width:220px; text-align:center; transition:0.3s; }
.card:hover { transform:scale(1.05); box-shadow:0 0 15px #6a0dad; }
.card img { width:100%; border-radius:10px; }
button { background:#6a0dad; color:white; border:none; padding:10px; cursor:pointer; border-radius:6px; }
footer { text-align:center; padding:20px; color:#888; }
</style>
</head>
<body>

<header>
  <img src="5starstunner.png">
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1 class="glow">5StarStunner</h1>
  <p class="glow-sub">Premium drip. Elite style. Stand out.</p>
  <button onclick="location.href='shop.html'">Shop Now</button>
</section>

<section class="products">
  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Featured Item</h3>
    <p>$25.00</p>
    <button>Add to Cart</button>
  </div>
</section>

<footer>
  © 2026 5StarStunner
</footer>

</body>
</html>
