body { margin:0; font-family: 'Segoe UI'; background:#050005; color:white; }

nav a { color:white; margin:0 15px; text-decoration:none; }
.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:30px; }

.card:hover { box-shadow:0 0 15px #6a0dad; }
.card img { width:100%; border-radius:10px; }
button { background:#6a0dad; border:none; padding:10px; color:white; border-radius:6px; cursor:pointer; }
</style>
</head>
