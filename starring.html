<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Star Ring</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="5starstunner.png">
</header>

<div style="display:flex; flex-wrap:wrap; padding:40px; gap:40px;">

  <!-- IMAGE -->
  <div>
    <img id="mainImg" src="star1.png" style="width:300px; border-radius:10px;">

    <div class="thumbs">
      <img src="star1.png" onclick="mainImg.src=this.src">
      <img src="star2.png" onclick="mainImg.src=this.src">
      <img src="star3.png" onclick="mainImg.src=this.src">
      <img src="star4.png" onclick="mainImg.src=this.src">
    </div>
  </div>

  <!-- INFO -->
  <div>
    <h1>Star Ring</h1>
    <p>$35.00</p>

    <p>
      High quality star ring with premium shine. 
      Perfect for everyday wear or special outfits.
    </p>

    <button>Add to Cart</button>
  </div>

</div>

</body>
</html>
